<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>❤️ Welcome ❤️</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #000, #ff4d6d);
        }

        .login-box {
            background: rgba(255, 255, 255, .12);
            backdrop-filter: blur(12px);
            padding: 35px;
            border-radius: 20px;
            width: 340px;
            text-align: center;
            color: white;
            box-shadow: 0 0 25px rgba(0, 0, 0, .4);
        }

        h1 {
            margin-bottom: 10px;
        }

        p {
            margin-bottom: 20px;
            color: #ffd6e0;
        }

        input {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            margin-bottom: 15px;
            font-size: 16px;
            outline: none;
        }

        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: #ff4d6d;
            color: white;
            font-size: 18px;
            cursor: pointer;
            transition: .3s;
        }

        button:hover {
            background: #ff2d55;
        }

        #error {
            margin-top: 15px;
            color: #ffd6d6;
        }
    </style>
</head>

<body>

    <div class="login-box">

        <h1>❤️ Welcome ❤️</h1>

        <p>اكتب كلمة السر ❤️</p>

        <input type="password" id="password" placeholder="Password">

        <button onclick="login()">دخول</button>

        <p id="error"></p>

    </div>

    <script>
        function login() {

            let pass = document.getElementById("password").value;

            if (pass === "I love you") {
                window.location.href = "memories.html";
            } else {
                document.getElementById("error").innerHTML = "❌ كلمة السر غير صحيحة";
            }

        }
    </script>

</body>

</html>
