<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ذكرياتنا ❤️</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: #111;
            color: white;
        }

        header {
            text-align: center;
            padding: 40px 20px;
            background: #ff4d6d;
        }

        header h1 {
            font-size: 40px;
        }

        section {
            width: 90%;
            max-width: 900px;
            margin: auto;
            padding: 30px 0;
        }

        h2 {
            text-align: center;
            color: #ff4d6d;
            margin-bottom: 25px;
        }

        .card {
            background: #222;
            border-radius: 15px;
            margin-bottom: 30px;
            overflow: hidden;
            box-shadow: 0 0 15px rgba(255, 77, 109, .3);
        }

        .card img {
            width: 100%;
            display: block;
        }

        .info {
            padding: 20px;
        }

        .date {
            color: #ff8fab;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .memory {
            color: #ddd;
            line-height: 1.8;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 15px;
        }

        .gallery img {
            width: 100%;
            border-radius: 15px;
        }
    </style>
</head>

<body>

    <header>
        <h1>❤️ ذكرياتنا ❤️</h1>
        <p>كل صورة بتحكي حكاية جميلة</p>
    </header>

    <section>

        <h2>📖 الذكريات</h2>

    <div class="images">
        <img src="memory1.jpeg">
        <img src="memory2.jpeg">
    </div>
    <div class="images">
        <img src="memory3.jpeg">
        <img src="memory4.jpeg">
    </div>
    
    <div class="images">
        <img src="memory5.jpeg">
        <img src="memory6.jpeg">
    </div>
    
    <div class="images">
        <img src="memory7.jpeg">
        <img src="memory8.jpeg">
    </div>

        <h2>💖 صور بحبها 💖</h2>

        <div class="gallery">
            <img src="photo1.jpeg">
            <img src="photo2.jpeg">
            <img src="photo3.jpeg">
            <img src="photo4.jpeg">
            <img src="photo5.jpeg">
            <img src="photo6.jpeg">
            <img src="photo7.jpeg">
            <img src="photo8.jpeg">
            <img src="photo9.jpeg">
        </div>

    </section>

</body>

</html>
